version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: myavbot
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  crawler-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file: .env
    depends_on:
      - mysql
      - redis
    volumes:
      - .:/app

  magnet-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    env_file: .env
    depends_on:
      - mysql
      - redis
    volumes:
      - .:/app

  bot-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - mysql
      - redis
    volumes:
      - .:/app

volumes:
  mysql_data:
